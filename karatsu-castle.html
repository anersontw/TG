<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐津城導覽</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .spot-img {
      width: 300px;
      height: 160px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 28px;
    }
    audio {
      width: 100%;
      border-radius: 12px;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="spot-img"
      src="https://tw.wamazing.com/media/wp-content/uploads/sites/4/2024/04/karatsujo_pixta_89406306_M-853x569.jpg"
      alt="唐津城">
    <h1>唐津城</h1>
    <audio controls autoplay
      src="https://raw.githubusercontent.com/anersontw/Travel-Guide/main/01唐津城.mp3">
      您的瀏覽器不支援音訊播放。
    </audio>
  </div>
</body>
</html>
